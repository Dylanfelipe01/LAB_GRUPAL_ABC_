<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ABC - LAB</title>
  <link rel="stylesheet" href="styles.css">
  
  <!-- Enlaces a Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Guides&display=swap" rel="stylesheet">
</head>
<body class="fondo-principal">

  <!-- navbar -->
  <header class="navbar">
    <h1>ABC - LAB</h1>
    <div class="contador-container">
      Tarjetas vistas: <span id="contador">0</span>
    </div>
  </header>

  <div class="filtros">
    <button onclick="filtrar('todas')">Mostrar todas</button>
    <button onclick="filtrar('vocales')">Mostrar vocales</button>
  </div>

  <main class="grid-cards">
    
    
    <div class="card" data-tipo="consonante" onclick="voltear(this)">
      <div class="card-frente">
        <h1>P</h1>
      </div>
      <div class="card-dorso">
        <img src="https://es.vecteezy.com/arte-vectorial/12658172-ilustracion-de-vector-de-dibujos-animados-lindo-cachorro-perro" alt="Perro">
        <h3>Perro</h3>
      </div>
    </div>

    <div class="card" data-tipo="consonante" onclick="voltear(this)">
      <div class="card-frente">
        <h1>Q</h1>
      </div>
      <div class="card-dorso">
        <img src="https://via.placeholder.com/100" alt="Queso">
        <h3>Queso</h3>
      </div>
    </div>

    <div class="card" data-tipo="consonante" onclick="voltear(this)">
      <div class="card-frente">
        <h1>R</h1>
      </div>
      <div class="card-dorso">
        <img src="https://via.placeholder.com/100" alt="Raton">
        <h3>Raton</h3>
      </div>
    </div>

    <div class="card" data-tipo="consonante" onclick="voltear(this)">
      <div class="card-frente">
        <h1>S</S></h1>
      </div>
      <div class="card-dorso">
        <img src="https://via.placeholder.com/100" alt="Sombrilla">
        <h3>Sombrilla</h3>
      </div>
    </div>

    <div class="card" data-tipo="consonante" onclick="voltear(this)">
      <div class="card-frente">
        <h1>T</h1>
      </div>
      <div class="card-dorso">
        <img src="https://via.placeholder.com/100" alt="Tetero">
        <h3>Tetero</h3>
      </div>
    </div>

    <!-- Agrega aquí las demas tarjetas -->

  </main>

  <script src="script.js"></script>
</body>
</html>
